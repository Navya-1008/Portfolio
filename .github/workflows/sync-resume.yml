name: Sync Resume from Google Drive

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download resume from Google Drive
        run: |
          curl -L "https://drive.google.com/uc?export=download&id=1csMOKDPZ5ouxeirg8h5oplECzSdpERvB" -o Navya_BV_Resume.pdf

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Navya_BV_Resume.pdf
          git diff --cached --quiet || git commit -m "sync resume from google drive"
          git push