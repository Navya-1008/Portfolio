name: Sync Resume from GitHub Releases

on:
  workflow_dispatch:

permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download resume from GitHub Releases
        run: |
          curl -L "https://github.com/Navya-1008/Portfolio/releases/download/resume/Navya_BV_Resume.pdf" -o Navya_BV_Resume.pdf

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Navya_BV_Resume.pdf
          git diff --cached --quiet || git commit -m "sync resume from releases"
          git push origin main